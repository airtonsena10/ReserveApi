services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: reserve_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reserve_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: build
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/reserve_api
      JWT_SECRET: 
    command: ["sh", "-c", "npm run db:migrate && npm run db:seed && npm start"]
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
